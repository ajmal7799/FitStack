version: '3.8'

services:
  fitstack-backend:
    build: .
    container_name: fitstack-backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: fitstack-redis
    restart: always
    ports:
      - "6379:6379"